<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contactá al equipo de Nexo Studio. Completá el formulario y te respondemos en menos de 24 horas.">
  <title>Contacto | Nexo Studio</title>
  <link rel="icon" type="image/png" href="img/isotipo.png">
  <link rel="stylesheet" href="estilos/style.css">
</head>

<body>

<header>
  <a href="index.html" class="logo-link">
    <img src="img/imagotipo.png" class="logo-img" alt="Nexo Studio">
  </a>
  <button class="hamburger" id="hamburger" aria-label="Abrir menú">&#9776;</button>
  <nav id="nav-menu">
    <ul>
      <li><a href="index.html">Inicio</a></li>
      <li><a href="servicios.html">Servicios</a></li>
      <li><a href="proyectos.html">Proyectos</a></li>
      <li><a href="contacto.html">Contacto</a></li>
    </ul>
  </nav>
</header>

<main>
  <h1>Contactanos</h1>
  <p>¿Tenés un proyecto en mente? Nos encantaría escucharte. Completá el formulario de contacto o escribinos directamente a hola@nexostudio.com y te responderemos en menos de 24 horas.</p>

  <form>
    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" name="nombre" placeholder="Tu nombre completo" required autocomplete="name">

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" placeholder="tu@email.com" required autocomplete="email">

    <label for="mensaje">Mensaje:</label>
    <textarea id="mensaje" name="mensaje" placeholder="Contanos sobre tu proyecto..." required></textarea>

    <button type="submit">Enviar</button>
  </form>
</main>

<footer>
  <img src="img/isotipo.png" class="footer-isotipo" alt="Nexo Studio">
  <p>© 2026 Nexo Studio. Todos los derechos reservados.</p>
</footer>

  <script src="js/menu.js"></script>
</body>
</html>
